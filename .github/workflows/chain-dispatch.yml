name: Chain-dispatch on merged ai-implement PR
on:
  pull_request:
    types: [closed]

# Minimum the reusable workflow needs: contents:read (the callee declares it at
# top level — a caller can't grant a reusable workflow less than it needs, or the
# run dies at startup_failure), read the closed PR/issue, and trigger the
# successor run via the Actions API. (CONSUMER-SETUP §4)
permissions:
  contents: read
  issues: read
  pull-requests: read
  actions: write

jobs:
  chain:
    # Only when an ai-implement PR actually merged — not on close-without-merge.
    if: |
      github.event.pull_request.merged == true
      && contains(github.event.pull_request.labels.*.name, 'ai-implement')
    # Pinned to an immutable commit SHA (supply-chain hardening), kept in lockstep
    # with claude.yml. Bump both deliberately in a reviewed PR. Current: post-v1.6.0.
    uses: freaxnx01/agent-pipeline/.github/workflows/chain-dispatch.yml@bae2aa2d099b9ed2a595fbd680232779bf56c8bf
    with:
      closed-pr-number: ${{ github.event.pull_request.number }}
      # Keep the cross-repo scripts checkout on the SAME ref as `uses:` above —
      # pipeline-ref defaults to `main` and would otherwise skew (Gotcha #1).
      pipeline-ref: bae2aa2d099b9ed2a595fbd680232779bf56c8bf
      # target-workflow defaults to claude.yml, which matches our stub filename.
    secrets:
      # Ambient repo token; the dispatch job needs issues:read, pull-requests:read,
      # actions:write (granted by the permissions block above).
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
