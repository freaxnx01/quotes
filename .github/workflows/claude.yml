name: Claude
on:
  issues:
    types: [labeled]

# A reusable workflow can't be granted more than its caller, and most repos
# default the workflow token to read-only — without this block the run ends in
# startup_failure before any job runs. (CONSUMER-SETUP §1)
permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  claude:
    if: github.event.label.name == 'ai-implement'
    # Pinned to an immutable commit SHA (supply-chain hardening) rather than the
    # moving @v1 tag. Bump deliberately in a reviewed PR. Current: post-v1.6.0
    # (OpenRouter model labels + slugs + triage fix + more models — #94/#96/#97/#98;
    # + qwen3.6-27b roster addition — #112).
    uses: freaxnx01/agent-pipeline/.github/workflows/claude-implement.yml@38875eeeaddf323ad3f47238da6dc5dfaca4c303
    secrets:
      CLAUDE_CODE_OAUTH_TOKEN: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
      OPENROUTER_API_KEY: ${{ secrets.OPENROUTER_API_KEY }}
    with:
      issue-number: ${{ github.event.issue.number }}
      # Keep the cross-repo scripts checkout on the SAME ref as `uses:` above —
      # pipeline-ref defaults to `main`, which would skew against the pinned
      # workflow (CONSUMER-SETUP Gotcha #1).
      pipeline-ref: 38875eeeaddf323ad3f47238da6dc5dfaca4c303
      # Public repo → GitHub-hosted runners only (never self-hosted; fork-PR
      # attack surface). DESIGN.md, non-negotiable.
      runner-labels: '["ubuntu-latest"]'
      default-model: claude-opus-4-7
      # Draft-only posture: no `auto-review: true` yet. Graduate to auto-merge
      # (CONSUMER-SETUP §2) only after several clean draft runs AND a required
      # `dotnet list package --vulnerable` status check is in place on master.
