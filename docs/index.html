<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Quotes Showcase</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #fff;
      color: #222;
      font-family: Arial, sans-serif;
    }

    main {
      max-width: 720px;
      padding: 2rem;
      text-align: center;
    }

    img {
      max-width: 220px;
      width: 100%;
      height: auto;
      margin-bottom: 1.5rem;
    }

    blockquote {
      margin: 0 0 1rem;
      font-size: 1.25rem;
      line-height: 1.5;
    }

    p {
      margin: 0.25rem 0;
    }

    a {
      color: #0a58ca;
    }
  </style>
</head>
<body>
  <main>
    <img src="images/HinterfrageAlles.png" alt="Hinterfrage Alles Robot">
    <blockquote>“The best way to predict the future is to invent it.”</blockquote>
    <p>— Alan Kay</p>
    <p><a href="https://freaxnx01.github.io/quotes">Open the live Quotes app</a></p>
  </main>
</body>
</html>
